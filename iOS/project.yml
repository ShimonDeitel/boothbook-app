name: Boothbook-MarketStalls
options:
  bundleIdPrefix: com.shimondeitel.boothbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Boothbook-MarketStalls:
    type: application
    platform: iOS
    sources:
      - path: Boothbook-MarketStalls
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boothbook
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Boothbook-MarketStalls/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Boothbook-MarketStallsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Boothbook-MarketStallsTests
      - path: Boothbook-MarketStalls.storekit
    dependencies:
      - target: Boothbook-MarketStalls
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boothbook.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Boothbook-MarketStallsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Boothbook-MarketStallsUITests
    dependencies:
      - target: Boothbook-MarketStalls
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boothbook.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Boothbook-MarketStalls:
    build:
      targets:
        Boothbook-MarketStalls: all
        Boothbook-MarketStallsTests: [test]
        Boothbook-MarketStallsUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Boothbook-MarketStalls.storekit
    test:
      config: Debug
      storeKitConfiguration: Boothbook-MarketStalls.storekit
      targets:
        - Boothbook-MarketStallsTests
        - Boothbook-MarketStallsUITests
    archive:
      config: Release
